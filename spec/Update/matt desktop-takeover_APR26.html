<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exactly AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0A0A0A;
      --white: #FFFFFF;
      --green: #7D8F3C;
      --navy: #1B2A4A;
      --orange: #FF6B35;
      --gray-50: #F9FAFB;
      --gray-100: #F5F5F4;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-700: #374151;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font-body);
      background: #DBEAFE;
      color: var(--black);
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── TOP NAV ── */
    .topnav {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 48px 16px;
      flex-shrink: 0;
      background: #DBEAFE;
      position: relative;
    }
    .topnav-logo {
      position: absolute;
      left: 48px;
      top: 20px;
      flex-shrink: 0;
    }
    .topnav-logo svg { display: block; }
    .topnav-items {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .topnav-item {
      padding: 8px 16px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: rgba(27,42,74,0.7);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      line-height: 1.3;
      text-align: left;
    }
    .topnav-item:hover { background: rgba(27,42,74,0.08); color: #1B2A4A; font-weight: 600; }
    .topnav-item.active { background: rgba(27,42,74,0.08); color: #1B2A4A; font-weight: 600; }
    .topnav-line1, .topnav-line2 { display: block; font-size: 13px; font-weight: 500; color: inherit; line-height: 1.3; }

    /* ── RIGHT PANEL ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      background: var(--white);
      border-radius: 16px 16px 0 0;
      overflow: hidden;
      margin: 0 48px;
      box-shadow: 0 -2px 24px rgba(27,42,74,0.08);
      max-height: 78vh;
      position: relative;
    }

    /* ── CHAT TOPBAR ── */
    .chat-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 32px;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
      background: var(--white);
    }

    .chat-topbar-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 16px;
      color: var(--white);
      flex-shrink: 0;
    }

    .chat-topbar-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--black);
      letter-spacing: -0.01em;
    }

    .chat-topbar-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    .chat-topbar-status span {
      font-size: 12px;
      color: var(--gray-400);
    }

    .topbar-social {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar-social a {
      color: #C4C9D4;
      display: flex;
      align-items: center;
      text-decoration: none;
      transition: color 0.15s;
    }
    .topbar-social a:hover { color: var(--navy); }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px 20px;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 2px; }

    .msg-bot {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      animation: fadeUp 0.4s ease both;
    }

    .bot-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: var(--font-display);
      font-size: 15px;
      color: var(--white);
      margin-top: 2px;
    }

    .bot-bubble {
      background: var(--gray-100);
      border-radius: 4px 18px 18px 18px;
      padding: 14px 18px;
      max-width: 72%;
      font-size: 15px;
      line-height: 1.6;
      color: var(--black);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .bot-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 6px;
    }

    .typing {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .typing-bubble {
      background: var(--gray-100);
      border-radius: 4px 18px 18px 18px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gray-400);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .msg-user {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
      animation: fadeUp 0.3s ease both;
    }

    .user-bubble {
      background: var(--navy);
      color: var(--white);
      border-radius: 18px 18px 4px 18px;
      padding: 14px 18px;
      max-width: 68%;
      font-size: 15px;
      line-height: 1.6;
    }



    /* ── CHAT INPUT ── */
    .chat-input-bar {
      padding: 12px 32px 20px;
      background: var(--white);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }


    .chat-input-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    .chat-input {
      width: 100%;
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      padding: 18px 64px 18px 20px;
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--black);
      background: var(--gray-100);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      box-sizing: border-box;
    }
    .chat-input::placeholder { color: var(--gray-400); }
    .chat-input:focus {
      border-color: var(--navy);
      background: var(--white);
    }

    .send-btn {
      position: absolute;
      right: 10px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--navy);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.15s;
    }
    .send-btn:hover { background: var(--green); transform: translateY(-1px); }
    .send-btn:active { opacity: 0.85; }

    /* ── QUICK WIN CONTROLS ── */
    .qw-progress-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--gray-200);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .qw-progress-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .qw-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gray-200);
      transition: background 0.3s, transform 0.3s;
    }
    .qw-dot.active {
      background: var(--green);
      transform: scale(1.2);
    }
    .qw-dot.done {
      background: var(--navy);
    }
    .qw-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qw-ctrl-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-600);
      background: none;
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .qw-ctrl-btn:hover { color: var(--navy); border-color: var(--navy); }
    .qw-ctrl-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
    .qw-speed-toggle {
      display: flex;
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      overflow: hidden;
    }
    .qw-speed-btn {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      color: var(--gray-600);
      background: none;
      border: none;
      border-right: 1px solid var(--gray-200);
      padding: 5px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .qw-speed-btn:last-child { border-right: none; }
    .qw-speed-btn:hover { background: var(--gray-100); color: var(--navy); }
    .qw-speed-btn.active { background: var(--navy); color: white; }

    /* ── PAUSE / RESUME FLOAT ── */
    .qw-pause-btn {
      position: absolute;
      bottom: 80px;
      right: 20px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      color: var(--white);
      background: var(--navy);
      border: none;
      border-radius: 20px;
      padding: 8px 14px;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(27,42,74,0.25);
      transition: background 0.15s, transform 0.15s;
    }
    .qw-pause-btn:hover { background: var(--green); transform: translateY(-1px); }

    /* ── SCROLL TO TOP ── */
    .qw-scroll-top {
      display: flex;
      justify-content: center;
      margin: 8px 0 4px;
    }
    .qw-scroll-top-btn {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-400);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s;
    }
    .qw-scroll-top-btn:hover { color: var(--navy); }

    /* ── REPLAY ── */
    .qw-replay-row {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }
    .qw-replay-btn {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-400);
      background: none;
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .qw-replay-btn:hover { color: var(--navy); border-color: var(--navy); }

    /* ── BOOKMARK ── */
    .qw-bookmark-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-400);
      transition: color 0.15s;
      padding: 0;
      display: flex;
      align-items: center;
    }
    .qw-bookmark-btn:hover, .qw-bookmark-btn.saved { color: var(--green); }

    /* ── QUICK WIN SEQUENCE STYLES ── */
    .qw-bubble {
      max-width: 92%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .qw-header {
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: 0.06em;
      color: var(--navy);
      line-height: 1.2;
    }
    .qw-body {
      font-size: 15px;
      line-height: 1.7;
      color: var(--black);
    }
    .qw-punchy {
      font-size: 15px;
      line-height: 1.7;
      color: var(--black);
    }
    .qw-bullets {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .qw-bullets li {
      font-size: 15px;
      line-height: 1.6;
      color: var(--black);
      padding-left: 16px;
      position: relative;
    }
    .qw-bullets li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--green);
    }
    .qw-cta-row {
      display: flex;
      gap: 10px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .qw-cta-btn {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .qw-cta-primary {
      background: var(--green);
      color: var(--white);
    }
    .qw-cta-primary:hover { background: #6a7a32; }
    .qw-cta-secondary {
      background: transparent;
      color: var(--navy);
      border: 1.5px solid var(--gray-200);
    }
    .qw-cta-secondary:hover { border-color: var(--navy); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── ICP CHECK WIDGET ── */
    .report-widget {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border: 1px solid var(--gray-200);
      font-family: var(--font-body);
      margin-top: 6px;
      animation: fadeUp 0.35s ease both;
    }
    /* Summary card */
    .rw-header { background: var(--navy); padding: 14px 18px 12px; }
    .rw-type { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.2em; color: var(--green); margin-bottom: 2px; }
    .rw-title { font-family: var(--font-display); font-size: 22px; letter-spacing: 1px; color: var(--white); line-height: 1; margin-bottom: 3px; }
    .rw-subtitle { font-size: 11px; color: rgba(255,255,255,0.75); line-height: 1.4; }
    .rw-snapshot { background: var(--gray-50); border-bottom: 1px solid var(--gray-200); padding: 8px 18px; }
    .rw-co-name { font-size: 11px; font-weight: 700; color: var(--navy); margin-bottom: 1px; }
    .rw-co-meta { font-size: 10.5px; color: var(--gray-500); line-height: 1.4; }
    .rw-summary { padding: 14px 18px; }
    .rw-punch { font-size: 13px; font-weight: 700; color: var(--navy); line-height: 1.5; margin-bottom: 10px; }
    .rw-teaser { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .rw-teaser-item { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: var(--gray-700); line-height: 1.45; }
    .rw-teaser-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; margin-top: 5px; }
    .rw-teaser-gem { background: rgba(125,143,60,0.12); border: 1px solid rgba(125,143,60,0.25); border-radius: 7px; padding: 7px 10px; display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: var(--gray-700); line-height: 1.45; }
    .rw-gem-tag { font-size: 9px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; margin-top: 1px; }
    .rw-expand-btn { width: 100%; font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--navy); background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 8px; padding: 9px 14px; cursor: pointer; text-align: center; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .rw-expand-btn:hover { background: var(--gray-200); }
    .rw-expand-btn .chevron { transition: transform 0.25s; font-style: normal; display: inline-block; }
    .rw-expand-btn.open .chevron { transform: rotate(180deg); }
    /* Accordion full report */
    .rw-full { display: none; border-top: 1px solid var(--gray-200); }
    .rw-full.visible { display: block; }
    .rw-accordion-item { border-bottom: 1px solid var(--gray-200); }
    .rw-accordion-item:last-of-type { border-bottom: none; }
    .rw-accordion-trigger { width: 100%; background: none; border: none; padding: 12px 18px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; font-family: var(--font-body); }
    .rw-accordion-trigger:hover { background: var(--gray-50); }
    .rw-acc-label { font-size: 12px; font-weight: 700; color: var(--navy); text-align: left; }
    .rw-acc-label.gem { color: var(--green); }
    .rw-acc-meta { font-size: 10.5px; color: var(--gray-400); text-align: left; }
    .rw-acc-gem-badge { font-size: 9px; font-weight: 700; color: var(--white); background: var(--green); border-radius: 4px; padding: 2px 6px; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
    .rw-acc-chevron { color: var(--gray-400); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
    .rw-accordion-trigger.open .rw-acc-chevron { transform: rotate(180deg); }
    .rw-accordion-content { max-height: 0; overflow: hidden; padding: 0 18px; transition: max-height 0.35s ease, padding 0.2s ease; }
    .rw-accordion-content.open { max-height: 1000px; padding: 0 18px 14px; }
    .rw-targets-lbl { font-size: 9.5px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px; }
    .rw-targets { font-size: 11px; color: var(--gray-500); line-height: 1.5; margin-bottom: 8px; font-style: italic; }
    .rw-para { font-size: 12px; color: var(--gray-700); line-height: 1.65; margin-bottom: 7px; }
    .rw-icp-punch { font-size: 12px; font-weight: 700; color: var(--navy); margin: 5px 0 7px; }
    .rw-market { font-size: 11px; color: var(--gray-700); line-height: 1.5; margin-bottom: 4px; }
    .rw-market strong { color: var(--navy); font-weight: 700; }
    .rw-reach { font-size: 11px; font-style: italic; color: var(--gray-400); line-height: 1.5; }
    .rw-reach strong { font-weight: 600; font-style: normal; color: var(--gray-500); }
    /* CTA + footer */
    .rw-cta { background: var(--navy); padding: 14px 18px; }
    .rw-cta-p { font-size: 11px; color: rgba(255,255,255,0.65); line-height: 1.55; margin-bottom: 3px; }
    .rw-cta-s { font-size: 11px; color: rgba(255,255,255,0.4); font-style: italic; margin-bottom: 10px; }
    .rw-cta-link { font-size: 12px; font-weight: 600; color: var(--green); text-decoration: none; }
    .rw-footer { background: var(--navy); padding: 9px 18px 12px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.07); }
    .rw-footer-brand { font-size: 10px; color: rgba(255,255,255,0.6); font-style: italic; }
    .rw-dl-btn { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--white); background: var(--green); border: 1px solid var(--green); border-radius: 5px; padding: 6px 12px; cursor: pointer; text-decoration: none; transition: background 0.15s; white-space: nowrap; }
    .rw-dl-btn:hover { background: #6a7a33; }

    /* ── ICONS + STAT BARS ── */
    .rw-acc-icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .rw-acc-icon.icp1 { background: rgba(27,42,74,0.08); }
    .rw-acc-icon.icp2 { background: rgba(255,107,53,0.1); }
    .rw-acc-icon.icp3 { background: rgba(125,143,60,0.12); }
    .rw-acc-trigger-left { display: flex; align-items: center; gap: 10px; }
    .rw-stat { margin: 8px 0 6px; }
    .rw-stat-label { font-size: 10px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
    .rw-stat-label span { font-weight: 400; color: var(--gray-500); text-transform: none; letter-spacing: 0; font-size: 11px; }
    .rw-stat-bars { display: flex; flex-direction: column; gap: 5px; }
    .rw-bar-row { display: flex; align-items: center; gap: 8px; }
    .rw-bar-track { flex: 1; height: 5px; background: var(--gray-200); border-radius: 3px; overflow: hidden; }
    .rw-bar-fill { height: 100%; border-radius: 3px; background: var(--navy); width: 0 !important; transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
    .rw-bar-fill.green { background: var(--green); }
    .rw-bar-fill.orange { background: var(--orange); }
    .rw-bar-fill.animated { width: var(--target-width) !important; }
    .rw-bar-val { font-size: 10px; color: var(--gray-500); white-space: nowrap; min-width: 60px; text-align: right; }

    /* ── BOOKMARK ── */
    .rw-header { position: relative; }
    .rw-bookmark-btn { position: absolute; top: 12px; right: 14px; background: none; border: none; cursor: pointer; padding: 4px; opacity: 0.5; transition: opacity 0.15s; }
    .rw-bookmark-btn:hover { opacity: 1; }
    .rw-bookmark-btn.saved .bookmark-icon { fill: #7D8F3C; stroke: #7D8F3C; }
    .rw-bookmark-btn.saved { opacity: 1; }
    .rw-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--navy); color: var(--white); font-family: var(--font-body); font-size: 12px; font-weight: 500; padding: 8px 16px; border-radius: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 9999; white-space: nowrap; }
    .rw-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── SHARE ── */
    .rw-footer { position: relative; }
    .rw-share-btn { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-body); font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 5px; padding: 6px 10px; cursor: pointer; text-decoration: none; transition: background 0.15s, color 0.15s; white-space: nowrap; }
    .rw-share-btn:hover { background: rgba(255,255,255,0.15); color: var(--white); }
    .rw-share-popover { position: absolute; bottom: calc(100% + 8px); right: 0; background: var(--white); border: 1px solid var(--gray-200); border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); padding: 6px; min-width: 180px; display: none; z-index: 100; }
    .rw-share-popover.open { display: block; animation: fadeUp 0.15s ease both; }
    .rw-share-option { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--gray-700); background: none; border: none; width: 100%; cursor: pointer; text-align: left; transition: background 0.1s; }
    .rw-share-option:hover { background: var(--gray-100); color: var(--navy); }
    .rw-share-option svg { flex-shrink: 0; color: var(--gray-400); }
    .rw-share-option:hover svg { color: var(--navy); }
    .rw-share-divider { height: 1px; background: var(--gray-200); margin: 4px 0; }
    .rw-footer-actions { display: flex; align-items: center; gap: 6px; }

    /* ── MOBILE BASE FIXES ── */
    @media (max-width: 480px) {
      /* Footer: stack brand on top, buttons below */
      .rw-footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 16px 14px;
      }
      .rw-footer-actions {
        width: 100%;
        justify-content: flex-start;
      }
      /* Accordion trigger: wrap meta below label */
      .rw-accordion-trigger {
        padding: 10px 14px;
      }
      .rw-acc-trigger-left {
        flex: 1;
        min-width: 0;
      }
      .rw-acc-label {
        font-size: 11px;
        white-space: normal;
      }
      .rw-acc-meta {
        font-size: 10px;
        white-space: normal;
      }
      /* Tighten body padding */
      .rw-summary, .rw-body {
        padding: 12px 14px 0;
      }
      .rw-accordion-content {
        padding: 0 14px;
      }
      .rw-accordion-content.open {
        padding: 0 14px 12px;
      }
      .rw-gem-banner {
        margin: 0 -14px 14px;
        padding: 6px 14px;
      }
      .rw-cta {
        margin: 14px -14px 0;
        padding: 12px 14px;
      }
      .rw-header {
        padding: 14px 14px 12px;
      }
      .rw-snapshot {
        padding: 8px 14px;
      }
      .rw-share-popover {
        right: auto;
        left: 0;
      }

      /* OPTION B: Swipeable cards — hidden on desktop */
      .rw-swipe-container { display: block; }
      .rw-accordion-view { display: none; }

      /* OPTION C: Scorecard — hidden on desktop */
      .rw-scorecard { display: block; }
    }

    /* Desktop: hide mobile-only views */
    @media (min-width: 481px) {
      .rw-swipe-container { display: none; }
      .rw-scorecard { display: none; }
      .rw-accordion-view { display: block; }
    }

    /* ── OPTION B: SWIPEABLE CARDS ── */
    .rw-swipe-container {
      display: none;
      overflow: hidden;
      position: relative;
    }
    .rw-swipe-track {
      display: flex;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .rw-swipe-card {
      min-width: 100%;
      padding: 14px;
      box-sizing: border-box;
    }
    .rw-card-tag {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gray-400);
      margin-bottom: 4px;
    }
    .rw-card-tag.gem { color: var(--green); }
    .rw-card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 2px;
      line-height: 1.3;
    }
    .rw-card-title.gem { color: var(--green); }
    .rw-card-targets {
      font-size: 11px;
      color: var(--gray-500);
      font-style: italic;
      line-height: 1.45;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--gray-200);
    }
    .rw-card-body {
      font-size: 12px;
      color: var(--gray-700);
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .rw-card-punch {
      font-size: 12px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .rw-card-market {
      font-size: 11px;
      color: var(--gray-700);
      margin-bottom: 4px;
    }
    .rw-card-market strong { color: var(--navy); font-weight: 700; }
    .rw-card-reach {
      font-size: 11px;
      font-style: italic;
      color: var(--gray-400);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .rw-card-reach strong { font-weight: 600; font-style: normal; color: var(--gray-500); }
    .rw-swipe-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 12px;
      border-top: 1px solid var(--gray-200);
    }
    .rw-swipe-btn {
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .rw-swipe-btn:disabled { background: var(--gray-200); color: var(--gray-400); cursor: default; }
    .rw-swipe-btn:not(:disabled):hover { background: #243d6b; }
    .rw-swipe-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .rw-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gray-200);
      transition: background 0.2s, transform 0.2s;
    }
    .rw-dot.active {
      background: var(--navy);
      transform: scale(1.3);
    }
    .rw-dot.gem-dot.active { background: var(--green); }

    /* ── OPTION C: SCORECARD ── */
    .rw-scorecard {
      display: none;
      padding: 12px 14px 0;
    }
    .rw-score-intro {
      font-size: 12px;
      color: var(--gray-500);
      margin-bottom: 12px;
      font-style: italic;
    }
    .rw-score-item {
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .rw-score-item.gem { border-color: rgba(125,143,60,0.35); }
    .rw-score-trigger {
      width: 100%;
      background: none;
      border: none;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-family: var(--font-body);
      text-align: left;
    }
    .rw-score-trigger:active { background: var(--gray-50); }
    .rw-score-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .rw-score-icon.icp1 { background: rgba(27,42,74,0.08); }
    .rw-score-icon.icp2 { background: rgba(255,107,53,0.1); }
    .rw-score-icon.icp3 { background: rgba(125,143,60,0.12); }
    .rw-score-info { flex: 1; min-width: 0; }
    .rw-score-name { font-size: 12px; font-weight: 700; color: var(--navy); line-height: 1.3; margin-bottom: 3px; }
    .rw-score-name.gem { color: var(--green); }
    .rw-score-pills { display: flex; gap: 4px; flex-wrap: wrap; }
    .rw-score-pill {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .rw-score-pill.strong { background: rgba(27,42,74,0.1); color: var(--navy); }
    .rw-score-pill.gem { background: rgba(125,143,60,0.15); color: var(--green); }
    .rw-score-pill.hidden { background: rgba(125,143,60,0.15); color: var(--green); }
    .rw-score-chevron { color: var(--gray-400); font-size: 12px; transition: transform 0.2s; }
    .rw-score-trigger.open .rw-score-chevron { transform: rotate(180deg); }
    .rw-score-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.2s ease;
      padding: 0 14px;
      border-top: 0px solid var(--gray-200);
    }
    .rw-score-detail.open {
      max-height: 800px;
      padding: 12px 14px;
      border-top: 1px solid var(--gray-200);
    }
    .rw-score-targets-lbl { font-size: 9px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px; }
    .rw-score-targets { font-size: 11px; color: var(--gray-500); font-style: italic; line-height: 1.5; margin-bottom: 8px; }
    .rw-score-para { font-size: 12px; color: var(--gray-700); line-height: 1.6; margin-bottom: 7px; }
    .rw-score-punch { font-size: 12px; font-weight: 700; color: var(--navy); margin: 5px 0 7px; }
    .rw-score-market { font-size: 11px; color: var(--gray-700); margin-bottom: 4px; }
    .rw-score-market strong { color: var(--navy); font-weight: 700; }
    .rw-score-reach { font-size: 11px; font-style: italic; color: var(--gray-400); line-height: 1.5; }
    .rw-score-reach strong { font-weight: 600; font-style: normal; color: var(--gray-500); }
    .rw-score-cta { background: var(--navy); margin: 14px -14px 0; padding: 12px 14px; }
    .rw-score-cta-p { font-size: 11px; color: rgba(255,255,255,0.65); line-height: 1.55; margin-bottom: 3px; }
    .rw-score-cta-s { font-size: 11px; color: rgba(255,255,255,0.4); font-style: italic; margin-bottom: 10px; }
    .rw-score-cta-link { font-size: 12px; font-weight: 600; color: var(--green); text-decoration: none; }
  </style>
</head>

<script>
  // Cookie-driven context — Matt replaces this with actual cookie read
  // e.g. const context = getCookie('exactly_context') || 'default';
  const context = 'quick-wins'; // stub — would be read from cookie

  const contextMap = {
    'quick-wins':          { label: 'Quick Wins',            message: null, useSequence: true },
    'deep-dives':          { label: 'Deep Dives',            message: "Hey — looks like Deep Dives caught your eye. Want me to walk you through what one looks like?" },
    'cro-chatbots':        { label: 'CRO Chatbots',          message: "Hey — interested in CRO Chatbots? I can show you exactly how one works — you're looking at it right now." },
    'exactly-difference':  { label: 'The Exactly Difference', message: "Hey — good question. Most AI companies hand you a tool. We hand you the outcome. Want me to explain what that means?" },
    'ai-roadmap':          { label: 'Your AI Roadmap',       message: "Hey — thinking about where to start with AI? I can map out the highest-impact moves for a business like yours." },
    'who-we-are':          { label: 'Who We Are',            message: "Hey — happy to tell you about us. Exactly AI builds done-for-you AI solutions for SMBs. No tools, no training — just outcomes. What would you like to know?" },
    'how-it-works':        { label: 'How It Works',          message: "Hey — the short version: you tell us your goal, we build and run the AI solution, you get the result. Want the full picture?" },
    'default':             { label: '',                      message: "Hey — glad you're here. What would you like to explore?" }
  };

  const ctx = contextMap[context] || contextMap['default'];

  // ── QUICK WIN SEQUENCE ──
  // Each entry: { text, isHeader, typingDelay (ms before typing starts), postDelay (ms after message before next) }
  // ── QUICK WIN GROUPED BUBBLES — PACED VERSION ──

  // Typing speeds (ms per char)
  const SPEED_HOOK         = 70;  // bubble 1 — slow and confident
  const SPEED_PUNCHY_SHORT = 120; // short punchy lines — under 15 chars, truly slow
  const SPEED_PUNCHY_LONG  = 75;  // longer punchy lines — deliberate but not labored
  const SPEED_BODY         = 40;  // normal body — comfortable, no rush
  const SPEED_BULLET       = 35;  // bullet text
  const BULLET_POST        = 3500; // ms after last bullet
  const BULLET_INTER       = 800;  // ms between bullets (after last word finishes)

  // Word-by-word speed per bullet, varied by length
  function bulletWordSpeed(text) {
    if (text.length > 70) return 220; // long — slower, more deliberate
    if (text.length > 40) return 160; // medium
    return 110;                        // short — snappier
  }

  // Pause after a bullet based on its length (reading time after words finish)
  function bulletPause(text) {
    if (text.length > 70) return 3200;
    if (text.length > 40) return 2200;
    return 1000;
  }

  // Type a bullet word by word into an li element, call onDone when finished
  function typeWords(el, text, baseSpeed, onDone) {
    const words = text.split(' ');
    let i = 0;
    function nextWord() {
      if (qwPaused) { qwResumeCallback = nextWord; return; }
      if (i >= words.length) { if (onDone) onDone(); return; }
      el.textContent += (i === 0 ? '' : ' ') + words[i];
      i++;
      setTimeout(nextWord, baseSpeed * qwSpeedMultiplier);
    }
    nextWord();
  }

  // Inter-bubble gaps (ms)
  const BUBBLE_GAPS = [2500, 2000, 3000, 2200, 2000, 3500, 0];

  // Helper: pick punchy speed based on length
  function punchySpeed(text) {
    return text.length <= 15 ? SPEED_PUNCHY_SHORT : SPEED_PUNCHY_LONG;
  }

  // Group definitions
  // part types: 'header' (instant), 'body' (typed), 'punchy' (typed slow), 'bullets' (staggered), 'cta' (instant)
  // ── SEQUENCE STATE ──
  let qwPaused = false;
  let qwResumeCallback = null;
  let qwSpeedMultiplier = 1.0; // 1=normal, 1.6=slow, 0.5=fast
  let qwCurrentGroup = 0;
  const QW_TOTAL = 7;
  const COMPANY = 'Reunited Clothing';

  const quickWinGroups = [
    { // 1 — Hook
      parts: [
        { type: 'body',   text: `Quick Win: AI Search Visibility Check for ${COMPANY}`, speed: SPEED_HOOK },
        { type: 'body',   text: 'When someone asks AI who does what you do — do you show up?', speed: SPEED_HOOK },
        { type: 'punchy', text: 'You didn\'t appear once.', speed: SPEED_HOOK },
      ]
    },
    { // 2 — The AI Test
      parts: [
        { type: 'header', text: 'THE AI TEST' },
        { type: 'body',   text: 'We tested the exact questions a retail buyer or talent manager would ask AI systems:', speed: SPEED_BODY },
        { type: 'bullets', lines: [
          'Who are the best private label apparel partners for celebrity brand collaborations?',
          'Which design houses help launch celebrity fashion lines at major retailers?',
          'What companies provide turnkey apparel manufacturing with celebrity brand management?',
        ]},
        { type: 'body',   text: 'Across ChatGPT, Gemini, and Perplexity — you didn\'t appear as a recommendation.', speed: SPEED_BODY },
        { type: 'punchy', text: 'Not once.' },
      ]
    },
    { // 3 — Transition
      parts: [
        { type: 'body',   text: 'AI is recommending companies with weaker portfolios.', speed: SPEED_BODY },
        { type: 'punchy', text: 'Because they describe their work clearly — and you don\'t.' },
      ]
    },
    { // 4 — Why AI Can't Find You
      parts: [
        { type: 'header', text: 'WHY AI CAN\'T FIND YOU' },
        { type: 'body',   text: 'Here\'s what\'s missing:', speed: SPEED_BODY },
        { type: 'bullets', lines: [
          'Your homepage is almost entirely images — AI has very little readable text to work with',

  // Type text char by char into an element, call onDone when finished
  function typeText(el, text, baseSpeed, onDone) {
    let i = 0;
    function nextChar() {
      if (qwPaused) { qwResumeCallback = nextChar; return; }
      if (i < text.length) {
        el.textContent += text[i]; i++;
        setTimeout(nextChar, baseSpeed * qwSpeedMultiplier);
      } else {
        if (onDone) onDone();
      }
    }
    nextChar();
  }

  // Append a part to a bubble, call onDone when the part is fully rendered
  function renderPart(bubble, part, msgDiv, onDone) {
    if (part.type === 'header') {
      const el = document.createElement('div');
      el.className = 'qw-header';
      el.textContent = part.text;
      bubble.appendChild(el);
      msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
      if (onDone) onDone();

    } else if (part.type === 'body' || part.type === 'punchy') {
      const el = document.createElement('div');
      el.className = part.type === 'punchy' ? 'qw-body qw-punchy' : 'qw-body';
      bubble.appendChild(el);
      msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
      const speed = part.type === 'punchy' ? punchySpeed(part.text) : (part.speed || SPEED_BODY);
      typeText(el, part.text, speed, () => {
        msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
        if (onDone) onDone();
      });

    } else if (part.type === 'bullets') {
      const ul = document.createElement('ul');
      ul.className = 'qw-bullets';
      bubble.appendChild(ul);

      function showBullet(i) {
        if (i >= part.lines.length) {
          setTimeout(() => { if (onDone) onDone(); }, BULLET_POST);
          return;
        }
        const li = document.createElement('li');
        ul.appendChild(li);
        msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });

        const text = part.lines[i];
        const speed = bulletWordSpeed(text);

        typeWords(li, text, speed, () => {
          msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
          // Reading pause after words finish, then next bullet
          setTimeout(() => showBullet(i + 1), bulletPause(text) + BULLET_INTER);
        });
      }
      showBullet(0);

    } else if (part.type === 'cta') {
      const row = document.createElement('div');
      row.className = 'qw-cta-row';
      row.innerHTML = `
        <a href="#" class="qw-cta-btn qw-cta-primary">Go deeper on this →</a>
        <a href="#" class="qw-cta-btn qw-cta-secondary" onclick="downloadPDF(); return false;">Download as PDF</a>
        <button class="qw-bookmark-btn" onclick="toggleBookmarkQW(this)" title="Bookmark this report">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        </button>`;
      bubble.appendChild(row);
      msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
      if (onDone) onDone();
    }
  }

  // Render all parts in a group sequentially, then call onDone
  function renderGroup(chatArea, group, groupIndex, onDone) {
    updateDot(groupIndex, 'active');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg-bot';
    msgDiv.innerHTML = `<div class="bot-avatar">E</div><div class="bot-bubble qw-bubble" id="qwb_${groupIndex}"></div>`;
    chatArea.appendChild(msgDiv);
    msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });

    const bubble = document.getElementById(`qwb_${groupIndex}`);

    function runPart(i) {
      if (i >= group.parts.length) {
        updateDot(groupIndex, 'done');
        const gap = (BUBBLE_GAPS[groupIndex] || 800) * qwSpeedMultiplier;
        waitIfPaused(() => setTimeout(() => { if (onDone) onDone(); }, gap));
        return;
      }
      const intraGap = i === 0 ? 0 : 600 * qwSpeedMultiplier;
      setTimeout(() => {
        renderPart(bubble, group.parts[i], msgDiv, () => runPart(i + 1));
      }, intraGap);
    }

    runPart(0);
  }

  function deliverQuickWin(chatArea) {
    initProgressBar();
    document.getElementById('qwPauseBtn').style.display = 'flex';

      if (i >= quickWinGroups.length) {

        document.getElementById('qwPauseBtn').style.display = 'none';
        appendScrollTop(chatArea);
        appendReplay(chatArea);
        return;
      }
      qwCurrentGroup = i;
      renderGroup(chatArea, quickWinGroups[i], i, () => runGroup(i + 1));

    runGroup(0);
  }

    else if (level === 'fast') qwSpeedMultiplier = 0.45;
    else qwSpeedMultiplier = 1.0;
    localStorage.setItem('qw_speed', level);
